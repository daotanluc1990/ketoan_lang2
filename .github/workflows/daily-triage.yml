name: Daily Triage Loop

# L1 report-only loop (scaffolded from loop-engineering daily-triage pattern).
# - Chạy mỗi sáng + có thể chạy tay qua Actions tab.
# - Gọi Gemini (cheap) để triage git log / issues / failing checks 24h gần nhất.
# - Ghi kết quả vào STATE.md (report-only, KHÔNG sửa code, KHÔNG commit code).
# - Thông báo Telegram cho owner (non-technical).
#
# Yêu cầu secrets (Settings → Secrets and variables → Actions):
#   GEMINI_API_KEY   — bắt buộc (default AI_PROVIDER của project)
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID — tuỳ chọn (bỏ nếu không dùng)

permissions:
  contents: write      # commit STATE.md
  issues: read         # đọc issues/PR cho triage
  pull-requests: read

on:
  schedule:
    # 03:00 UTC = ~10:00 giờ Việt Nam (Asia/Ho_Chi_Minh)
    - cron: '0 3 * * *'
  workflow_dispatch: {}   # chạy tay từ Actions tab

concurrency:
  group: daily-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # cần git log đầy đủ để triage

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gather triage context (git + issues + checks)
        id: gather
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "## Commits (24h qua)"
            git log --since='24 hours ago' --pretty=format:'- %h %s' || true
            echo ""
            echo "## Files thay đổi (24h)"
            git log --since='24 hours ago' --name-only --pretty=format: | sort -u | sed '/^$/d' | head -50 || true
            echo ""
            echo "## PR đang mở"
            gh pr list --state open --limit 20 --json number,title,author,updatedAt \
              --template '{{range .}}- #{{.number}} {{.title}} (by @{{.author.login}}){{"\n"}}{{end}}' || true
            echo ""
            echo "## Checks gần nhất (main)"
            gh run list --branch main --limit 5 --json status,conclusion,name,createdAt \
              --template '{{range .}}- {{.name}}: {{.status}} / {{.conclusion}} ({{.createdAt}}){{"\n"}}{{end}}' || true
          } > /tmp/context.md
          echo "Wrote $(wc -l < /tmp/context.md) lines"

      - name: Run loop-triage via Gemini (L1 report-only)
        id: llm
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: |
          set -euo pipefail
          node <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const ctx = readFileSync('/tmp/context.md', 'utf8');
          const skill = readFileSync('skills/loop-triage/SKILL.md', 'utf8');
          const constraints = readFileSync('loop-constraints.md', 'utf8');
          const prompt =
            `${skill}\n\n` +
            `## CONSTRAINTS (binding)\n${constraints}\n\n` +
            `## PROJECT CONTEXT\nNext.js accounting/sheet app for non-technical owner. L1 = REPORT ONLY, no code edits.\n` +
            `Owner-facing text must be plain Vietnamese.\n\n` +
            `## RAW CONTEXT TO TRIAGE\n${ctx}\n\n` +
            `## OUTPUT\nVietnamese, plain language. Sections: 1) Cần chú ý (High Priority), ` +
            `2) Theo dõi (Watch), 3) Bỏ qua (Noise), 4) Ghi nhớ (State Updates). Be brutally concise.`;
          const key = process.env.GEMINI_API_KEY;
          const model = process.env.GEMINI_MODEL || 'gemini-2.5-flash';
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: 'user', parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.2, maxOutputTokens: 1500 },
            }),
          });
          if (!res.ok) { console.error(await res.text()); process.exit(2); }
          const data = await res.json();
          const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '(Gemini không trả kết quả)';
          writeFileSync('/tmp/triage.md', text);
          console.log('Gemini OK, ' + text.length + ' chars');
          NODE

      - name: Fallback when no GEMINI_API_KEY
        if: ${{ secrets.GEMINI_API_KEY == '' }}
        run: |
          cp /tmp/context.md /tmp/triage.md
          echo -e "\n\n> ⚠️ Chưa cấu hình GEMINI_API_KEY → chỉ hiển thị raw context, chưa qua triage AI." >> /tmp/triage.md

      - name: Update STATE.md (report-only)
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Chèn block triage vào STATE.md sau dòng "Last run:" (giữ template gốc)
          python3 - <<PY
          import datetime, pathlib, re
          state = pathlib.Path('STATE.md').read_text(encoding='utf-8')
          triage = pathlib.Path('/tmp/triage.md').read_text(encoding='utf-8').strip()
          now = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          state = re.sub(r'(?m)^Last run:.*$', f'Last run: {now}', state, count=1)
          block = f"\n## Triage @ {now}\n\n{triage}\n"
          state = state + "\n" + block
          pathlib.Path('STATE.md').write_text(state, encoding='utf-8')
          print('STATE.md updated, +', len(block), 'chars')
          PY

      - name: Commit STATE.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATE.md
          if git diff --cached --quiet; then
            echo "Không có thay đổi — bỏ qua commit."
          else
            git commit -m "chore(loop): daily triage report $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify Telegram (optional)
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          MSG=$(printf '🔄 Daily Triage xong (ketoan_lang2)\n\n%s' "$(head -c 3500 /tmp/triage.md)")
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" > /dev/null || true
